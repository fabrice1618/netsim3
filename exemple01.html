<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
    <title>Simulator</title>
    <script type="text/javascript" src="examples/data01.json"></script>
    <script type="text/javascript" src="dist/networksim.min.js"></script>
    <script type="text/javascript">
    function init() 
    {
	NetworkSimulator.initialdata = exampledata;
	var loader = new ImageLoader(
	["img/64/switch.png", 
	    "img/64/router2.png", 
	    "img/64/computer.png", 
	    "img/64/server_web.png", 
	    "img/64/server_dns.png", 
	    "img/64/server_dhcp.png", 
	    "img/64/envelope-DHCP.png", 
	    "img/64/envelope-DNS.png", 
	    "img/64/envelope-HTTP.png",
	    "img/64/envelope-ICMP.png"], 
	simulator
	);
	loader.load();
    }
    </script>
    <meta content="">
    <link rel="stylesheet" href="css/app.css">
  </head>
  <body onload="init();">
    <nav id="topnav" class="ns-navbar"></nav>
    <div class="ns-layout">
      <aside id="sidebar" class="ns-sidebar"></aside>
      <div id="simcontainer" class="ns-canvaswrap">
        <canvas id="simcanvas" width="2048" height="1024" style="width:2048px; height:1024px;"></canvas>
      </div>
    </div>
  </body>
</html>
